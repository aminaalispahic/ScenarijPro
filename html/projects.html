<!doctype html>
<html lang="hr">
  <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="projects.css" rel="stylesheet" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>ScenarijPro</title>
  </head>
  <body>
    <div class="okvir">
        <div class="lijevo">
            <h1 style="color:rgb(60, 60, 233); font-family: Inter; font-size: 40px;">ScriptFlow</h1>
            <div style="padding-left: 20px;">
                <p class="aktivno"><i class="fa-solid fa-folder "></i> Projekti</p>
                <p><i class="fa-solid fa-chart-bar"></i> Statistika</p>
                <p><i class="fa-solid fa-gear"></i> Postavke</p>
                <hr class="separator">
                <div class="user-profile">
                    <div class="user-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name">Alex Writer</div>
                        <div class="user-status">Pro Member</div>
                    </div>
                </div>
            </div>
        </div> <!-- ← Zatvara .lijevo -->
        
      <div class="desno">
    <header class="zaglavlje">
        <h1 style="font-size: 40px;">Svi scenariji</h1>
        <form >
             <i class="fas fa-search"></i>
            <input  class="pretraga" type="text" placeholder="Pretraga">
           
            <button >+ Novi projekat</button>
        </form>
    </header>
    <div class="kartice">
    <div class="kartica active">
     <div class="naziv">Scenarij 1</div>
     <div class="opis">Opis</div>
     <div class="status"><b>Status</b></div>
     <div class="broj"><b>Broj stranica</b></div>
     <div class="vrijeme"><b>Vrijeme</b></div>
</div>

<div class="kartica">
     <div class="naziv">Scenarij 2</div>
     <div class="opis">Opis</div>
     <div class="status"><b>Status</b></div>
     <div class="broj"><b>Broj stranica</b></div>
     <div class="vrijeme"><b>Vrijeme</b></div>
</div>

<div class="kartica">
     <div class="naziv">Scenarij 3</div>
     <div class="opis">Opis</div>
     <div class="status"><b>Status</b></div>
     <div class="broj"><b>Broj stranica</b></div>
     <div class="vrijeme"><b>Vrijeme</b></div>
</div>

<div class="kartica kreiraj">
     <div><i class="fas fa-folder-plus"></i></div><br>
     <div>Kreiraj novi scenarij</div>
</div>



    </div><!--ovdje zavrsava kartica-->
</div> <!-- ← Zatvara .desno -->
    </div> <!-- ← Zatvara .okvir -->
  </body>
</html>
